<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#071a13" />
  <title>DIGIY EXPLORE — Fiche Spot</title>
  <meta name="description" content="Fiche spot DIGIY EXPLORE (WhatsApp, localisation, lien, contact direct)." />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#071a13;
      --card:#0b2a1f;
      --line:rgba(255,255,255,.12);
      --text:#eafff1;
      --muted:rgba(234,255,241,.72);
      --gold:#facc15;
      --orange:#f59e0b;
      --green:#22c55e;
      --danger:#fb7185;
      --shadow:0 14px 40px rgba(0,0,0,.35);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,Arial;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg) 0%, #020617 100%);
    }
    .wrap{max-width:1080px;margin:0 auto;padding:16px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px;border:1px solid var(--line);
      border-radius:22px;background:rgba(11,42,31,.65);
      position:sticky;top:10px;z-index:30;
    }
    .btn{
      padding:10px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.25);cursor:pointer;
      font-size:12px;
    }
    .btn.gold{background:rgba(250,204,21,.15)}
    .badge{
      padding:8px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;display:none;
    }
    .badge.boost{background:rgba(245,158,11,.18)}
    .grid{display:grid;grid-template-columns:1fr .9fr;gap:14px;margin-top:14px}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}
    .panel{border:1px solid var(--line);border-radius:var(--r);padding:14px}
    .row{display:flex;justify-content:space-between;gap:10px;margin-top:10px}
    #map{height:360px;border-radius:var(--r)}
  </style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div><b>DIGIY EXPLORE</b></div>
    <div>
      <span id="badgeBoost" class="badge boost">🔥 Boost actif</span>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2 id="spotName">Chargement…</h2>
      <div id="spotMeta" style="color:var(--muted);margin-bottom:10px"></div>

      <!-- BOOST BOX -->
      <div id="boostBox" class="panel" style="display:none;margin-bottom:14px">
        <div style="font-weight:700;margin-bottom:6px">Boost Tourisme</div>
        <div id="boostBoxText" style="margin-bottom:8px"></div>
        <button id="btnBoost" class="btn gold" style="display:none">🔥 Booster ce spot</button>
      </div>

      <div id="phoneLine"></div>
      <div class="row">
        <button id="btnWhats" class="btn">💬 WhatsApp</button>
      </div>
    </div>

    <div>
      <div id="map"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc3Ftd2pqdHNlZnlqbmx1b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNzg4ODIsImV4cCI6MjA4MDc1NDg4Mn0.dZfYOc2iL2_wRYL3zExZFsFSBK6AbMeOid2LrIjcTdA";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:false } });

function qs(k){ return new URLSearchParams(location.search).get(k); }
function normalizePhone(p){ return (p||"").replace(/[^\d+]/g,""); }

async function checkExploreBoost(phone){
  if(!phone) return false;
  const { data } = await sb.rpc("digiy_has_access", { p_phone: phone, p_module: "EXPLORE_BOOST" });
  return !!data;
}

async function loadSpot(){
  const slug = qs("slug");
  if(!slug){ document.getElementById("spotName").textContent="Slug manquant"; return; }

  const { data } = await sb
    .from("digiy_explore_spots")
    .select("*")
    .eq("slug", slug)
    .eq("status","published")
    .maybeSingle();

  if(!data){ document.getElementById("spotName").textContent="Introuvable"; return; }

  document.getElementById("spotName").textContent = data.name;
  document.getElementById("spotMeta").textContent = data.city || "";

  const phone = normalizePhone(data.phone);
  document.getElementById("phoneLine").textContent = phone || "—";

  document.getElementById("btnWhats").onclick = ()=>{
    if(!phone) return;
    window.open(`https://wa.me/${phone}`, "_blank");
  };

  // MAP
  const map = L.map("map").setView([data.lat||14.4, data.lng||-17.0], 15);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  if(data.lat && data.lng){
    L.marker([data.lat,data.lng]).addTo(map);
  }

  // BOOST CHECK
  const isProMode = qs("pro")==="1";
  const boostActive = await checkExploreBoost(phone);

  if(boostActive){
    document.getElementById("badgeBoost").style.display="inline-block";
  }else if(isProMode){
    document.getElementById("boostBox").style.display="block";
    document.getElementById("boostBoxText").textContent =
      "🔒 Aucun boost actif. Active un niveau pour remonter en vitrine.";
    const btn = document.getElementById("btnBoost");
    btn.style.display="inline-block";
    btn.onclick = ()=>{
      window.open(`https://beauville.github.io/abos/?module=EXPLORE_BOOST&phone=${phone}&plan=local`, "_blank");
    };
  }
}

loadSpot();
</script>
</body>
</html>
