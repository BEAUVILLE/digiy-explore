<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DIGIY EXPLORE — Voir. Sortir. Vivre.</title>

  <style>
    :root{
      --bg:#06130f;
      --card:#0c241c;
      --gold:#d4af37;
      --ink:#f8fafc;
      --muted:rgba(248,250,252,.7);
    }

    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    .wrap{
      max-width:1100px;
      margin:auto;
      padding:16px;
    }

    h1{
      font-size:28px;
      margin:0 0 10px;
    }

    .hero{
      margin-bottom:20px;
    }

    .hero img{
      width:100%;
      height:260px;
      object-fit:cover;
      border-radius:18px;
    }

    .heroText{
      margin-top:10px;
    }

    .btn{
      display:inline-block;
      margin-top:10px;
      padding:10px 14px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--gold),#f3d46b);
      color:#102014;
      font-weight:bold;
      text-decoration:none;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:14px;
    }

    .card{
      background:var(--card);
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
    }

    .card img{
      width:100%;
      height:160px;
      object-fit:cover;
    }

    .cardContent{
      padding:10px;
    }

    .title{
      font-weight:700;
      margin-bottom:4px;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- HERO -->
  <section class="hero">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Saly plage">

    <div class="heroText">
      <h1>🌴 Saly — Les meilleurs spots du moment</h1>
      <div class="meta">Sortir • Découvrir • Profiter maintenant</div>

      <a href="#spots" class="btn">Voir les spots</a>
    </div>
  </section>

  <!-- LISTE -->
  <section id="spots" class="grid">

    <!-- CARD 1 -->
    <a class="card" href="./fiche.html?slug=explore-221771342889">
      <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5" alt="">
      <div class="cardContent">
        <div class="title">Jet Ski Saly</div>
        <div class="meta">Activity • Saly Centre</div>
      </div>
    </a>

    <!-- CARD 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="">
      <div class="cardContent">
        <div class="title">Restaurant plage</div>
        <div class="meta">Food • Ngaparou</div>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff" alt="">
      <div class="cardContent">
        <div class="title">Sortie lagune</div>
        <div class="meta">Nature • Somone</div>
      </div>
    </div>

  </section>

</div>

</body>
</html>
